<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hi doka, seid ihr bereit? · disruptive.wtf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #14264A;
    --navy-deep: #0B1730;
    --navy-deeper: #081027;
    --paper: #FAF8F2;
    --signal: #F5B824;
    --signal-hot: #FFCC00;
    --signal-glow: rgba(245, 184, 36, 0.30);
    --muted: #8FA0BC;
    --sans: 'Archivo', -apple-system, 'Helvetica Neue', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: var(--sans);
    background: var(--navy-deep);
    color: var(--paper);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    position: relative;
  }

  ::selection { background: var(--signal); color: var(--navy); }

  .stage {
    position: relative;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(120% 90% at 22% 38%, rgba(36,62,112,0.55) 0%, rgba(11,23,48,0) 60%),
      linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 55%, var(--navy-deeper) 100%);
  }

  /* ---------- background: blueprint grid ---------- */
  .bg-grid {
    position: absolute;
    inset: -2px;
    background-image:
      linear-gradient(rgba(143,160,188,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(143,160,188,0.10) 1px, transparent 1px),
      linear-gradient(rgba(143,160,188,0.16) 1px, transparent 1px),
      linear-gradient(90deg, rgba(143,160,188,0.16) 1px, transparent 1px);
    background-size: 40px 40px, 40px 40px, 200px 200px, 200px 200px;
    animation: gridDrift 26s linear infinite;
  }
  @keyframes gridDrift {
    from { background-position: 0 0, 0 0, 0 0, 0 0; }
    to   { background-position: 40px 40px, 40px 40px, 200px 200px, 200px 200px; }
  }

  /* ---------- background: drifting beams ---------- */
  .beam {
    position: absolute;
    width: 220%;
    height: 150px;
    left: -60%;
    background: linear-gradient(90deg, transparent 0%, var(--signal-glow) 45%, rgba(255,204,0,0.42) 50%, var(--signal-glow) 55%, transparent 100%);
    transform: rotate(-19deg);
    filter: blur(2px);
    opacity: 0.55;
    mix-blend-mode: screen;
  }
  .beam.b1 { top: 24%; animation: beamDrift 19s ease-in-out infinite; }
  .beam.b2 { top: 58%; height: 90px; opacity: 0.4; animation: beamDrift 24s ease-in-out infinite reverse; }
  @keyframes beamDrift {
    0%, 100% { transform: rotate(-19deg) translateX(-4%); }
    50%      { transform: rotate(-19deg) translateX(6%); }
  }

  /* ---------- background: glow ---------- */
  .glow {
    position: absolute;
    width: 60vw;
    height: 60vw;
    max-width: 720px;
    max-height: 720px;
    left: 8%;
    top: 30%;
    background: radial-gradient(circle, var(--signal-glow) 0%, rgba(245,184,36,0) 68%);
    filter: blur(20px);
    animation: breathe 7s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 0.85; transform: scale(1.08); }
  }

  /* ---------- background: survey marks ---------- */
  .mark {
    position: absolute;
    color: var(--signal);
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 400;
    opacity: 0.0;
    user-select: none;
    animation: markPulse 4s ease-in-out infinite;
  }
  .mark::before { content: "+"; }
  .m1 { top: 16%; right: 14%; animation-delay: 0.2s; }
  .m2 { top: 70%; right: 24%; animation-delay: 1.3s; font-size: 16px; }
  .m3 { top: 40%; right: 8%;  animation-delay: 2.4s; font-size: 28px; }
  .m4 { top: 84%; left: 12%;  animation-delay: 0.9s; font-size: 18px; }
  .m5 { top: 12%; left: 42%;  animation-delay: 3.0s; font-size: 14px; }
  @keyframes markPulse {
    0%, 100% { opacity: 0.12; }
    50%      { opacity: 0.5; }
  }

  /* ---------- corner brackets ---------- */
  .bracket {
    position: absolute;
    width: 26px;
    height: 26px;
    z-index: 8;
    pointer-events: none;
    opacity: 0;
    animation: bracketIn 0.8s ease 0.2s forwards;
  }
  .bracket.tl { top: 20px; left: 20px; border-top: 2px solid var(--signal); border-left: 2px solid var(--signal); }
  .bracket.tr { top: 20px; right: 20px; border-top: 2px solid rgba(143,160,188,0.5); border-right: 2px solid rgba(143,160,188,0.5); }
  .bracket.bl { bottom: 32px; left: 20px; border-bottom: 2px solid rgba(143,160,188,0.5); border-left: 2px solid rgba(143,160,188,0.5); }
  .bracket.br { bottom: 32px; right: 20px; border-bottom: 2px solid var(--signal); border-right: 2px solid var(--signal); }
  @keyframes bracketIn { to { opacity: 1; } }

  /* ---------- topbar ---------- */
  .topbar {
    position: relative;
    z-index: 9;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 34px clamp(28px, 6vw, 84px) 0;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .brand { font-weight: 600; color: var(--paper); }
  .brand b { color: var(--signal); }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    border: 1px solid rgba(245,184,36,0.4);
    padding: 7px 13px;
    color: var(--signal);
  }
  .pill .dot {
    width: 8px; height: 8px;
    background: var(--signal-hot);
    box-shadow: 0 0 0 0 var(--signal-glow);
    animation: pulse 1.7s infinite;
    display: inline-block;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 var(--signal-glow); }
    70%  { box-shadow: 0 0 0 7px rgba(245,184,36,0); }
    100% { box-shadow: 0 0 0 0 rgba(245,184,36,0); }
  }

  /* ---------- hero content ---------- */
  .hero {
    position: relative;
    z-index: 9;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px clamp(28px, 6vw, 84px) 60px;
    max-width: 1280px;
  }

  .hi {
    font-family: var(--mono);
    font-size: clamp(0.95rem, 2vw, 1.35rem);
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--muted);
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.4s forwards;
  }
  .hi b { color: var(--paper); font-weight: 600; }

  .answer {
    font-size: clamp(1.7rem, 5vw, 3.4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--signal);
    margin-bottom: clamp(22px, 4vh, 40px);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.85s cubic-bezier(.16,1,.3,1) 0.55s forwards;
  }

  h1 {
    font-size: clamp(2.9rem, 11.5vw, 10rem);
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 0.86;
    text-wrap: balance;
  }
  h1 span { display: block; }
  h1 .row1 {
    opacity: 0;
    transform: translateY(28px);
    animation: fadeUp 0.95s cubic-bezier(.16,1,.3,1) 0.7s forwards;
  }
  h1 .row2 {
    opacity: 0;
    transform: translateY(28px);
    animation: fadeUp 0.95s cubic-bezier(.16,1,.3,1) 0.84s forwards;
  }
  h1 mark {
    background: none;
    color: var(--signal);
    position: relative;
  }
  h1 mark::after {
    content: "";
    position: absolute;
    left: 0; bottom: 0.08em;
    width: 100%; height: 0.07em;
    background: var(--signal);
    transform: scaleX(0);
    transform-origin: left;
    animation: underline 0.7s cubic-bezier(.16,1,.3,1) 1.5s forwards;
  }
  @keyframes underline { to { transform: scaleX(1); } }

  .signoff {
    margin-top: clamp(34px, 6vh, 58px);
    font-family: var(--mono);
    font-size: clamp(0.95rem, 1.7vw, 1.2rem);
    letter-spacing: 0.04em;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.15s forwards;
  }
  .signoff .rock {
    color: var(--paper);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .signoff .rock::before {
    content: "";
    width: 30px; height: 2px;
    background: var(--signal);
    display: inline-block;
  }
  .signoff .me { color: var(--signal); font-weight: 700; }

  .ps {
    margin-top: 30px;
    font-family: var(--mono);
    font-size: clamp(0.8rem, 1.3vw, 0.95rem);
    letter-spacing: 0.05em;
    color: var(--muted);
    opacity: 0;
    animation: fadeUp 0.8s ease 1.3s forwards;
  }

  .actions {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: clamp(0.95rem, 1.7vw, 1.2rem);
    font-weight: 600;
    letter-spacing: 0.02em;
    text-decoration: none;
    padding: 13px 20px;
    border: 1px solid transparent;
    transition: border-color 0.3s ease, background 0.3s ease, color 0.3s ease, transform 0.3s cubic-bezier(.16,1,.3,1);
    opacity: 0;
  }
  .cta .arrow { transition: transform 0.3s cubic-bezier(.16,1,.3,1); }
  .cta:hover .arrow { transform: translateX(5px); }

  /* primary: solid yellow, the loud one */
  .cta-primary {
    background: var(--signal);
    color: var(--navy);
    border-color: var(--signal);
    animation: fadeUp 0.8s ease 1.42s forwards;
  }
  .cta-primary .arrow { color: var(--navy); }
  .cta-primary:hover {
    background: var(--signal-hot);
    border-color: var(--signal-hot);
    transform: translateY(-2px);
  }

  /* secondary: outlined email */
  .mailto {
    color: var(--paper);
    border-color: rgba(143,160,188,0.35);
    animation: fadeUp 0.8s ease 1.54s forwards;
  }
  .mailto .arrow { color: var(--signal); }
  .mailto:hover {
    border-color: var(--signal);
    color: var(--signal);
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  /* ---------- caution strip (bottom) ---------- */
  .caution {
    position: relative;
    z-index: 9;
    height: 14px;
    width: 100%;
    background-image: repeating-linear-gradient(
      -45deg,
      var(--signal) 0px, var(--signal) 18px,
      var(--navy-deeper) 18px, var(--navy-deeper) 36px
    );
    background-size: 51px 100%;
    animation: march 2.4s linear infinite;
    box-shadow: 0 -10px 30px rgba(245,184,36,0.12);
  }
  @keyframes march { from { background-position: 0 0; } to { background-position: 51px 0; } }

  @media (max-width: 600px) {
    .bracket.bl, .bracket.br { bottom: 28px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .hi, .answer, h1 .row1, h1 .row2, .signoff, .ps, .cta { opacity: 1 !important; transform: none !important; }
    h1 mark::after { transform: scaleX(1); }
    .bracket, .mark { opacity: 1; }
  }
</style>
</head>
<body>

  <div class="stage">

    <div class="bg-grid"></div>
    <div class="beam b1"></div>
    <div class="beam b2"></div>
    <div class="glow"></div>
    <span class="mark m1"></span>
    <span class="mark m2"></span>
    <span class="mark m3"></span>
    <span class="mark m4"></span>
    <span class="mark m5"></span>

    <span class="bracket tl"></span>
    <span class="bracket tr"></span>
    <span class="bracket bl"></span>
    <span class="bracket br"></span>

    <header class="topbar">
      <span class="brand">disruptive<b>.wtf</b></span>
      <span class="pill"><span class="dot"></span> bereit</span>
    </header>

    <main class="hero">
      <p class="hi">hi <b>doka</b>, seid ihr bereit?</p>
      <p class="answer">wir sind bereit.</p>
      <h1>
        <span class="row1">f&uuml;r die zukunft</span>
        <span class="row2">der <mark>baustelle</mark></span>
      </h1>
      <p class="signoff">
        <span class="rock">let's rock and roll,</span><br>
        euer <span class="me">markus</span>
      </p>
      <p class="ps">p.s. unseren vorschlag gibt's hier in voller l&auml;nge:</p>
      <div class="actions">
        <a class="cta cta-primary" href="https://rainergeeeee.github.io/disruptive-x-doka/" target="_blank" rel="noopener noreferrer">
          vorschlag ansehen <span class="arrow">&rarr;</span>
        </a>
        <a class="cta mailto" href="mailto:mp@disruptive.wtf?subject=Die%20Zukunft%20der%20Baustelle">
          <span class="arrow">&rarr;</span>mp@disruptive.wtf
        </a>
      </div>
    </main>

    <div class="caution"></div>

  </div>

</body>
</html>
